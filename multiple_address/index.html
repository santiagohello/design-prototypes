<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multiple Address — Wireframe</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
    }

    /* ── Navbar ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 24px;
      height: 56px;
      border-bottom: 1px solid #1e1e1e;
      background: #141414;
    }

    .address-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border: 1px solid #2e2e2e;
      border-radius: 8px;
      background: #1c1c1c;
      color: #e0e0e0;
      font-size: 13px;
      cursor: pointer;
      transition: background 120ms, border-color 120ms;
      font-family: "SF Mono", "Fira Code", monospace;
    }
    .address-btn:hover { background: #242424; border-color: #3e3e3e; }

    .address-btn .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #4ade80;
      flex-shrink: 0;
    }

    .address-btn .chevron {
      width: 12px;
      height: 12px;
      opacity: 0.5;
    }

    /* ── Overlay ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(2px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .overlay.open { display: flex; }

    /* ── Modal ── */
    .modal {
      background: #181818;
      border: 1px solid #272727;
      border-radius: 14px;
      width: 340px;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(0,0,0,0.6);
    }

    .modal-header {
      padding: 16px 18px 12px;
      border-bottom: 1px solid #222;
    }
    .modal-header h2 {
      font-size: 13px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    /* ── Address list ── */
    .address-list {
      list-style: none;
      padding: 8px 0;
    }

    .address-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 18px;
      cursor: pointer;
      transition: background 100ms;
      position: relative;
    }
    .address-item:hover { background: #202020; }
    .address-item.active { background: #1e2a1e; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
    }

    .addr-info { flex: 1; min-width: 0; }
    .addr-label {
      font-size: 13px;
      font-weight: 500;
      color: #e0e0e0;
      margin-bottom: 2px;
    }
    .addr-hash {
      font-size: 11px;
      color: #555;
      font-family: "SF Mono", "Fira Code", monospace;
    }

    .check-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 100ms;
    }
    .address-item.active .check-icon { opacity: 1; }

    /* ── 3-dot menu button ── */
    .more-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: #666;
      cursor: pointer;
      opacity: 0;
      transition: opacity 100ms, background 100ms, color 100ms;
      flex-shrink: 0;
    }
    .address-item:hover .more-btn { opacity: 1; }
    .more-btn:hover { background: #2e2e2e; color: #bbb; }

    /* ── Footer ── */
    .modal-footer {
      padding: 12px 18px 16px;
      border-top: 1px solid #222;
    }

    .connect-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 10px;
      border: 1px dashed #2e2e2e;
      border-radius: 8px;
      background: transparent;
      color: #666;
      font-size: 13px;
      cursor: pointer;
      transition: background 120ms, color 120ms, border-color 120ms;
    }
    .connect-btn:hover {
      background: #1e1e1e;
      color: #aaa;
      border-color: #444;
    }

    /* ── Context menu ── */
    .context-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .context-overlay.open { display: flex; }

    .context-menu {
      background: #1e1e1e;
      border: 1px solid #2e2e2e;
      border-radius: 10px;
      width: 220px;
      overflow: hidden;
      box-shadow: 0 16px 40px rgba(0,0,0,0.7);
    }

    .context-menu-header {
      padding: 12px 16px 10px;
      border-bottom: 1px solid #272727;
    }
    .context-menu-header .ctx-label {
      font-size: 12px;
      font-weight: 600;
      color: #e0e0e0;
      margin-bottom: 2px;
    }
    .context-menu-header .ctx-hash {
      font-size: 11px;
      color: #555;
      font-family: "SF Mono", "Fira Code", monospace;
    }

    .context-menu-items {
      list-style: none;
      padding: 6px 0;
    }

    .ctx-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 16px;
      font-size: 13px;
      color: #ccc;
      cursor: pointer;
      transition: background 80ms;
    }
    .ctx-item:hover { background: #272727; }
    .ctx-item.destructive { color: #f87171; }
    .ctx-item.destructive:hover { background: #2a1a1a; }

    .ctx-item svg { flex-shrink: 0; opacity: 0.7; }
    .ctx-item:hover svg { opacity: 1; }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav>
    <button class="address-btn" id="addressBtn">
      <span class="dot"></span>
      0x3fA8…c29D
      <svg class="chevron" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 4.5L6 8L10 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </nav>

  <!-- Wallet list overlay -->
  <div class="overlay" id="overlay">
    <div class="modal" role="dialog" aria-modal="true" aria-label="Select address">

      <div class="modal-header">
        <h2>Wallets</h2>
      </div>

      <ul class="address-list" id="addressList">

        <li class="address-item active" data-address="0x3fA8…c29D" data-label="Main">
          <div class="avatar" style="background:#5b6af5;">A</div>
          <div class="addr-info">
            <div class="addr-label">Main</div>
            <div class="addr-hash">0x3fA8…c29D</div>
          </div>
          <svg class="check-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 8.5L6.5 12L13 5" stroke="#4ade80" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <button class="more-btn" aria-label="More options">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="7" cy="2.5" r="1.2" fill="currentColor"/>
              <circle cx="7" cy="7" r="1.2" fill="currentColor"/>
              <circle cx="7" cy="11.5" r="1.2" fill="currentColor"/>
            </svg>
          </button>
        </li>

        <li class="address-item" data-address="0xB9c1…44aF" data-label="Trading">
          <div class="avatar" style="background:#e0785a;">B</div>
          <div class="addr-info">
            <div class="addr-label">Trading</div>
            <div class="addr-hash">0xB9c1…44aF</div>
          </div>
          <svg class="check-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 8.5L6.5 12L13 5" stroke="#4ade80" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <button class="more-btn" aria-label="More options">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="7" cy="2.5" r="1.2" fill="currentColor"/>
              <circle cx="7" cy="7" r="1.2" fill="currentColor"/>
              <circle cx="7" cy="11.5" r="1.2" fill="currentColor"/>
            </svg>
          </button>
        </li>

        <li class="address-item" data-address="0x71dE…f08C" data-label="Cold storage">
          <div class="avatar" style="background:#a855f7;">C</div>
          <div class="addr-info">
            <div class="addr-label">Cold storage</div>
            <div class="addr-hash">0x71dE…f08C</div>
          </div>
          <svg class="check-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 8.5L6.5 12L13 5" stroke="#4ade80" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <button class="more-btn" aria-label="More options">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="7" cy="2.5" r="1.2" fill="currentColor"/>
              <circle cx="7" cy="7" r="1.2" fill="currentColor"/>
              <circle cx="7" cy="11.5" r="1.2" fill="currentColor"/>
            </svg>
          </button>
        </li>

      </ul>

      <div class="modal-footer">
        <button class="connect-btn">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M7 1V13M1 7H13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
          Connect new wallet
        </button>
      </div>

    </div>
  </div>

  <!-- Context menu overlay -->
  <div class="context-overlay" id="contextOverlay">
    <div class="context-menu" role="menu">
      <div class="context-menu-header">
        <div class="ctx-label" id="ctxLabel"></div>
        <div class="ctx-hash" id="ctxHash"></div>
      </div>
      <ul class="context-menu-items">
        <li class="ctx-item" role="menuitem">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M9.5 2.5L11.5 4.5L5 11H3V9L9.5 2.5Z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Edit name
        </li>
        <li class="ctx-item destructive" role="menuitem">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 3.5H12M5 3.5V2.5H9V3.5M5.5 6V10.5M8.5 6V10.5M3 3.5L3.5 11.5H10.5L11 3.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Delete
        </li>
        <li class="ctx-item" role="menuitem">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="2" width="10" height="10" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
            <path d="M5 5H9M5 7H9M5 9H7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          View paper wallet
        </li>
      </ul>
    </div>
  </div>

  <script>
    const addressBtn = document.getElementById('addressBtn');
    const overlay = document.getElementById('overlay');
    const contextOverlay = document.getElementById('contextOverlay');
    const ctxLabel = document.getElementById('ctxLabel');
    const ctxHash = document.getElementById('ctxHash');
    const items = document.querySelectorAll('.address-item');

    // Open wallet list modal
    addressBtn.addEventListener('click', () => overlay.classList.add('open'));

    // Close wallet list on backdrop click
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) overlay.classList.remove('open');
    });

    // Close context menu on backdrop click
    contextOverlay.addEventListener('click', (e) => {
      if (e.target === contextOverlay) contextOverlay.classList.remove('open');
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (contextOverlay.classList.contains('open')) {
          contextOverlay.classList.remove('open');
        } else {
          overlay.classList.remove('open');
        }
      }
    });

    // Select address
    items.forEach(item => {
      item.addEventListener('click', (e) => {
        // Don't select if clicking the more button
        if (e.target.closest('.more-btn')) return;

        items.forEach(i => i.classList.remove('active'));
        item.classList.add('active');

        const addr = item.dataset.address;
        addressBtn.childNodes.forEach(n => {
          if (n.nodeType === Node.TEXT_NODE) n.textContent = addr;
        });

        setTimeout(() => overlay.classList.remove('open'), 150);
      });
    });

    // Open context menu
    document.querySelectorAll('.more-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const item = btn.closest('.address-item');
        ctxLabel.textContent = item.dataset.label;
        ctxHash.textContent = item.dataset.address;
        contextOverlay.classList.add('open');
      });
    });
  </script>

</body>
</html>
